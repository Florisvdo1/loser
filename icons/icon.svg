<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kuur app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#264F8C"/>
      <stop offset="0.5" stop-color="#173366"/>
      <stop offset="1" stop-color="#0C1F40"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEFBF4"/>
      <stop offset="1" stop-color="#EDE3CA"/>
    </linearGradient>
    <linearGradient id="paperEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E2244" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#0E2244" stop-opacity="0"/>
      <stop offset="1" stop-color="#0E2244" stop-opacity="0.22"/>
    </linearGradient>
    <radialGradient id="bandageShine" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redShine" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>

  <!-- Faint hex pattern (echoes the medication packaging) -->
  <g opacity="0.05" fill="#FAF8F4">
    <g transform="translate(40, 80) scale(0.85)">
      <path d="M 30 0 L 60 17 L 60 51 L 30 68 L 0 51 L 0 17 Z" />
      <path d="M 90 0 L 120 17 L 120 51 L 90 68 L 60 51 L 60 17 Z" />
      <path d="M 150 0 L 180 17 L 180 51 L 150 68 L 120 51 L 120 17 Z" />
      <path d="M 210 0 L 240 17 L 240 51 L 210 68 L 180 51 L 180 17 Z" />
      <path d="M 270 0 L 300 17 L 300 51 L 270 68 L 240 51 L 240 17 Z" />
      <path d="M 330 0 L 360 17 L 360 51 L 330 68 L 300 51 L 300 17 Z" />
      <path d="M 390 0 L 420 17 L 420 51 L 390 68 L 360 51 L 360 17 Z" />
      <path d="M 450 0 L 480 17 L 480 51 L 450 68 L 420 51 L 420 17 Z" />
      <path d="M 510 0 L 540 17 L 540 51 L 510 68 L 480 51 L 480 17 Z" />
    </g>
  </g>

  <!-- Bandage diagonally centered -->
  <g filter="url(#softShadow)" transform="rotate(-22 256 256)">
    <!-- Body -->
    <rect x="72" y="216" width="368" height="80" rx="22" fill="url(#paper)" stroke="#0E2244" stroke-width="3"/>
    <!-- Edge shadow -->
    <rect x="72" y="216" width="368" height="80" rx="22" fill="url(#paperEdge)"/>
    <!-- Perforation dots, left -->
    <g fill="#0E2244" opacity="0.42">
      <circle cx="108" cy="234" r="3.4"/><circle cx="108" cy="256" r="3.4"/><circle cx="108" cy="278" r="3.4"/>
      <circle cx="124" cy="234" r="3.4"/><circle cx="124" cy="256" r="3.4"/><circle cx="124" cy="278" r="3.4"/>
      <circle cx="140" cy="234" r="3.4"/><circle cx="140" cy="256" r="3.4"/><circle cx="140" cy="278" r="3.4"/>
    </g>
    <!-- Perforation dots, right -->
    <g fill="#0E2244" opacity="0.42">
      <circle cx="372" cy="234" r="3.4"/><circle cx="372" cy="256" r="3.4"/><circle cx="372" cy="278" r="3.4"/>
      <circle cx="388" cy="234" r="3.4"/><circle cx="388" cy="256" r="3.4"/><circle cx="388" cy="278" r="3.4"/>
      <circle cx="404" cy="234" r="3.4"/><circle cx="404" cy="256" r="3.4"/><circle cx="404" cy="278" r="3.4"/>
    </g>
    <!-- Center pad -->
    <rect x="200" y="226" width="112" height="60" rx="8" fill="#F7F0DA" stroke="#0E2244" stroke-width="1.6" opacity="0.6"/>
    <!-- Stitched edge on pad -->
    <rect x="200" y="226" width="112" height="60" rx="8" fill="none" stroke="#0E2244" stroke-width="1" stroke-dasharray="3 3" opacity="0.32"/>
    <!-- Bandage shine -->
    <rect x="72" y="216" width="368" height="80" rx="22" fill="url(#bandageShine)"/>
    <!-- Red medical plus (with subtle highlight) -->
    <g>
      <rect x="244" y="232" width="24" height="48" rx="3" fill="#B91C1C"/>
      <rect x="232" y="244" width="48" height="24" rx="3" fill="#B91C1C"/>
      <rect x="244" y="232" width="24" height="48" rx="3" fill="url(#redShine)"/>
      <rect x="232" y="244" width="48" height="24" rx="3" fill="url(#redShine)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="256" y="464" text-anchor="middle"
        font-family="'Times New Roman', Georgia, serif" font-style="italic" font-size="38"
        fill="#FAF8F4" opacity="0.55" letter-spacing="2">kuur</text>
</svg>
