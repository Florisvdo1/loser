<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13192C"/>
      <stop offset="1" stop-color="#070B16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.1" r="0.85">
      <stop offset="0" stop-color="#D4B888" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#D4B888" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capLeft" x1="0" y1="-1" x2="0" y2="1">
      <stop offset="0" stop-color="#F3DDB1"/>
      <stop offset="1" stop-color="#C9A876"/>
