  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="rgba(212,184,136,0.20)" stroke-width="1.2"/>

  <ellipse cx="256" cy="378" rx="160" ry="14" fill="rgba(0,0,0,0.55)" filter="url(#soft)"/>

  <g transform="translate(256 256) rotate(-28)">
