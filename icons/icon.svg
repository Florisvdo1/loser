    <line x1="0" y1="-49" x2="0" y2="49" stroke="rgba(0,0,0,0.20)" stroke-width="1.5"/>
    <path d="M -132 -28 a 38 38 0 0 1 32 -36 H -10" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 14 -36 H 96 a 38 38 0 0 1 30 14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-78" cy="0" r="6" fill="#8DD4B5"/>
