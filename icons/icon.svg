    <linearGradient id="capRight" x1="0" y1="-1" x2="0" y2="1">
      <stop offset="0" stop-color="#465272"/>
      <stop offset="1" stop-color="#1B233B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
